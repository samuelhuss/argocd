{{- $ns := include "ns.name" . -}}
{{- $root := . -}}
{{- $np := .Values.networkPolicies | default dict -}}
{{- $cfg := $np.allowEgress | default dict -}}
{{- $policies := $cfg.policies | default list -}}
{{- if $policies -}}
{{- range $policyIndex, $policy := $policies }}
{{- $name := $policy.name | default (printf "allow-egress-%d" (add1 $policyIndex)) -}}
{{- $endpoints := $policy.endpoints | default list -}}
{{- if not $endpoints -}}
{{- fail (printf "networkPolicies.allowEgress.policies[%d].endpoints e obrigatorio" $policyIndex) -}}
{{- end -}}
{{- $defaultPorts := $policy.defaultPorts | default ($cfg.defaultPorts | default (list 443)) -}}
{{- $defaultProtocol := $policy.protocol | default ($cfg.protocol | default "TCP") -}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $root | nindent 4 }}
    claro.com.br/policy-name: {{ $name | quote }}
spec:
  description: "Allow egress to specific external endpoints (FQDN/CIDR/IP)"
  endpointSelector: {}
  egress:
{{ range $index, $ep := $endpoints }}
{{- $endpoint := "" }}
{{- $type := "" }}
{{- $ports := $defaultPorts }}
{{- $protocol := $defaultProtocol }}
{{- if kindIs "string" $ep }}
{{- $endpoint = $ep }}
{{- else }}
{{- $endpoint = required (printf "networkPolicies.allowEgress.policies[%d].endpoints[%d].endpoint e obrigatorio" $policyIndex $index) $ep.endpoint }}
{{- $ports = $ep.ports | default $defaultPorts }}
{{- $protocol = $ep.protocol | default $defaultProtocol }}
{{- if $ep.type }}
{{- $type = lower $ep.type }}
{{- end }}
{{- end }}
{{- if not $type }}
{{- if contains "/" $endpoint }}
{{- $type = "cidr" }}
{{- else if regexMatch "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" $endpoint }}
{{- $type = "ip" }}
{{- else }}
{{- $type = "fqdn" }}
{{- end }}
{{- end }}
    -
{{- if eq $type "fqdn" }}
      toFQDNs:
        - matchName: {{ $endpoint | quote }}
{{- else if eq $type "cidr" }}
      toCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $type "ip" }}
      toCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.allowEgress.policies[%d].endpoints[%d].type invalido: use fqdn, cidr ou ip" $policyIndex $index) }}
{{- end }}
{{- if $ports }}
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{ end }}
{{- end }}
{{- end }}
{{- end }}
{{- else if $cfg.enabled -}}
{{- $endpoints := $cfg.endpoints | default list -}}
{{- if not $endpoints -}}
{{- fail "networkPolicies.allowEgress.enabled=true requer pelo menos um item em networkPolicies.allowEgress.endpoints" -}}
{{- end -}}
{{- $defaultPorts := $cfg.defaultPorts | default (list 443) -}}
{{- $defaultProtocol := $cfg.protocol | default "TCP" -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-egress
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" . | nindent 4 }}
    claro.com.br/policy-name: "allow-egress"
spec:
  description: "Allow egress to specific external endpoints (FQDN/CIDR/IP)"
  endpointSelector: {}
  egress:
{{ range $index, $ep := $endpoints }}
{{- $endpoint := "" }}
{{- $type := "" }}
{{- $ports := $defaultPorts }}
{{- $protocol := $defaultProtocol }}
{{- if kindIs "string" $ep }}
{{- $endpoint = $ep }}
{{- else }}
{{- $endpoint = required (printf "networkPolicies.allowEgress.endpoints[%d].endpoint e obrigatorio" $index) $ep.endpoint }}
{{- $ports = $ep.ports | default $defaultPorts }}
{{- $protocol = $ep.protocol | default $defaultProtocol }}
{{- if $ep.type }}
{{- $type = lower $ep.type }}
{{- end }}
{{- end }}
{{- if not $type }}
{{- if contains "/" $endpoint }}
{{- $type = "cidr" }}
{{- else if regexMatch "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" $endpoint }}
{{- $type = "ip" }}
{{- else }}
{{- $type = "fqdn" }}
{{- end }}
{{- end }}
    -
{{- if eq $type "fqdn" }}
      toFQDNs:
        - matchName: {{ $endpoint | quote }}
{{- else if eq $type "cidr" }}
      toCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $type "ip" }}
      toCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.allowEgress.endpoints[%d].type invalido: use fqdn, cidr ou ip" $index) }}
{{- end }}
{{- if $ports }}
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{ end }}
{{- end }}
{{- end }}
{{- end }}

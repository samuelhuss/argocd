{{- $ns := include "ns.name" . -}}
{{- $root := . -}}
{{- $np := .Values.networkPolicies | default dict -}}
{{- $cfg := $np.gateway | default dict -}}
{{- $policies := $cfg.policies | default list -}}
{{- if $policies -}}
{{- range $i, $p := $policies }}
{{- $name := $p.name | default (printf "allow-gateway-api-%d" (add1 $i)) -}}
{{- $direction := lower ($p.direction | default ($cfg.direction | default "ingress")) -}}
{{- if ne $direction "ingress" -}}
{{- fail (printf "networkPolicies.gateway.policies[%d].direction deve ser ingress" $i) -}}
{{- end -}}
{{- $sourceNs := $p.namespace | default ($p.source | default ($cfg.namespace | default $root.Values.gatewayNamespace)) -}}
{{- if not $sourceNs -}}
{{- fail (printf "networkPolicies.gateway.policies[%d].namespace ou gateway.namespace e obrigatorio" $i) -}}
{{- end -}}
{{- $ports := $p.ports | default ($cfg.ports | default (list 8080 8443)) -}}
{{- $protocol := $p.protocol | default ($cfg.protocol | default "TCP") -}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $root | nindent 4 }}
    claro.com.br/policy-name: {{ $name | quote }}
spec:
  description: "Allow ingress from Gateway API controller"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ $sourceNs | quote }}
      toPorts:
        - ports:
{{- range $port := $ports }}
            - port: {{ printf "%v" $port | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}
{{- else if $cfg.enabled -}}
{{- $direction := lower ($cfg.direction | default "ingress") -}}
{{- if ne $direction "ingress" -}}
{{- fail "networkPolicies.gateway.direction deve ser ingress" -}}
{{- end -}}
{{- $sourceNs := $cfg.namespace | default $root.Values.gatewayNamespace -}}
{{- if not $sourceNs -}}
{{- fail "networkPolicies.gateway.enabled=true requer namespace em networkPolicies.gateway.namespace" -}}
{{- end -}}
{{- $ports := $cfg.ports | default (list 8080 8443) -}}
{{- $protocol := $cfg.protocol | default "TCP" -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-gateway-api
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $root | nindent 4 }}
    claro.com.br/policy-name: "allow-gateway-api"
spec:
  description: "Allow ingress from Gateway API controller"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ $sourceNs | quote }}
      toPorts:
        - ports:
{{- range $port := $ports }}
            - port: {{ printf "%v" $port | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}

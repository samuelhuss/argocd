{{- $ns := include "ns.name" . -}}
{{- $root := . -}}
{{- $np := .Values.networkPolicies | default dict -}}
{{- $cfg := $np.allowObservabilityMetrics | default dict -}}
{{- $policies := $cfg.policies | default list -}}
{{- if $policies -}}
{{- range $i, $p := $policies }}
{{- $name := $p.name | default (printf "allow-observability-metrics-%d" (add1 $i)) -}}
{{- $sourceNs := $p.namespace | default ($cfg.namespace | default "observability") -}}
{{- $ports := $p.ports | default ($cfg.ports | default (list 9090)) -}}
{{- $protocol := $p.protocol | default ($cfg.protocol | default "TCP") -}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $root | nindent 4 }}
    claro.com.br/policy-name: "allow-observability-metrics"
spec:
  description: "Allow metrics scraping from observability namespace"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ $sourceNs | quote }}
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}
{{- else if $cfg.enabled -}}
{{- $sourceNs := $cfg.namespace | default "observability" -}}
{{- $ports := $cfg.ports | default (list 9090) -}}
{{- $protocol := $cfg.protocol | default "TCP" -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-observability-metrics
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" . | nindent 4 }}
    claro.com.br/policy-name: "allow-observability-metrics"
spec:
  description: "Allow metrics scraping from observability namespace"
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: {{ $sourceNs | quote }}
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}

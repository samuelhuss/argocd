{{- $ns := include "ns.name" . -}}
{{- $root := . -}}
{{- $np := .Values.networkPolicies | default dict -}}
{{- $cfg := $np.external | default dict -}}
{{- $policies := $cfg.policies | default list -}}
{{- if $policies -}}
{{- range $policyIndex, $policy := $policies }}
{{- $name := $policy.name | default (printf "allow-external-%d" (add1 $policyIndex)) -}}
{{- $direction := lower ($policy.direction | default ($cfg.direction | default "egress")) -}}
{{- if and (ne $direction "ingress") (ne $direction "egress") -}}
{{- fail (printf "networkPolicies.external.policies[%d].direction deve ser ingress ou egress" $policyIndex) -}}
{{- end -}}
{{- $endpoints := $policy.endpoints | default list -}}
{{- if not $endpoints -}}
{{- fail (printf "networkPolicies.external.policies[%d].endpoints e obrigatorio" $policyIndex) -}}
{{- end -}}
{{- $defaultPorts := $policy.defaultPorts | default ($cfg.defaultPorts | default (list 443)) -}}
{{- $defaultProtocol := $policy.protocol | default ($cfg.protocol | default "TCP") -}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $root | nindent 4 }}
    claro.com.br/policy-name: {{ $name | quote }}
spec:
  description: "Allow external traffic with configurable direction"
  endpointSelector: {}
{{- if eq $direction "egress" }}
  egress:
{{- else }}
  ingress:
{{- end }}
{{ range $index, $ep := $endpoints }}
{{- $endpoint := "" }}
{{- $type := "" }}
{{- $ports := $defaultPorts }}
{{- $protocol := $defaultProtocol }}
{{- if kindIs "string" $ep }}
{{- $endpoint = $ep }}
{{- else }}
{{- $endpoint = required (printf "networkPolicies.external.policies[%d].endpoints[%d].endpoint e obrigatorio" $policyIndex $index) $ep.endpoint }}
{{- $ports = $ep.ports | default $defaultPorts }}
{{- $protocol = $ep.protocol | default $defaultProtocol }}
{{- if $ep.type }}
{{- $type = lower $ep.type }}
{{- end }}
{{- end }}
{{- if not $type }}
{{- if contains "/" $endpoint }}
{{- $type = "cidr" }}
{{- else if regexMatch "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" $endpoint }}
{{- $type = "ip" }}
{{- else }}
{{- $type = "fqdn" }}
{{- end }}
{{- end }}
    -
{{- if and (eq $direction "ingress") (eq $type "fqdn") }}
{{- fail (printf "networkPolicies.external.policies[%d].endpoints[%d] com type=fqdn nao suporta direction=ingress" $policyIndex $index) }}
{{- else if eq $direction "egress" }}
{{- if eq $type "fqdn" }}
      toFQDNs:
        - matchName: {{ $endpoint | quote }}
{{- else if eq $type "cidr" }}
      toCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $type "ip" }}
      toCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.external.policies[%d].endpoints[%d].type invalido: use fqdn, cidr ou ip" $policyIndex $index) }}
{{- end }}
{{- else if eq $type "cidr" }}
      fromCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $type "ip" }}
      fromCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.external.policies[%d].endpoints[%d].type invalido: use cidr ou ip para direction=ingress" $policyIndex $index) }}
{{- end }}
{{- if $ports }}
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{ end }}
{{- end }}
{{- end }}
{{- end }}
{{- else if $cfg.enabled -}}
{{- $direction := lower ($cfg.direction | default "egress") -}}
{{- if and (ne $direction "ingress") (ne $direction "egress") -}}
{{- fail "networkPolicies.external.direction deve ser ingress ou egress" -}}
{{- end -}}
{{- $endpoints := $cfg.endpoints | default list -}}
{{- if not $endpoints -}}
{{- fail "networkPolicies.external.enabled=true requer pelo menos um item em networkPolicies.external.endpoints" -}}
{{- end -}}
{{- $defaultPorts := $cfg.defaultPorts | default (list 443) -}}
{{- $defaultProtocol := $cfg.protocol | default "TCP" -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-external
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" . | nindent 4 }}
    claro.com.br/policy-name: "allow-external"
spec:
  description: "Allow external traffic with configurable direction"
  endpointSelector: {}
{{- if eq $direction "egress" }}
  egress:
{{- else }}
  ingress:
{{- end }}
{{ range $index, $ep := $endpoints }}
{{- $endpoint := "" }}
{{- $type := "" }}
{{- $ports := $defaultPorts }}
{{- $protocol := $defaultProtocol }}
{{- if kindIs "string" $ep }}
{{- $endpoint = $ep }}
{{- else }}
{{- $endpoint = required (printf "networkPolicies.external.endpoints[%d].endpoint e obrigatorio" $index) $ep.endpoint }}
{{- $ports = $ep.ports | default $defaultPorts }}
{{- $protocol = $ep.protocol | default $defaultProtocol }}
{{- if $ep.type }}
{{- $type = lower $ep.type }}
{{- end }}
{{- end }}
{{- if not $type }}
{{- if contains "/" $endpoint }}
{{- $type = "cidr" }}
{{- else if regexMatch "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" $endpoint }}
{{- $type = "ip" }}
{{- else }}
{{- $type = "fqdn" }}
{{- end }}
{{- end }}
    -
{{- if and (eq $direction "ingress") (eq $type "fqdn") }}
{{- fail (printf "networkPolicies.external.endpoints[%d] com type=fqdn nao suporta direction=ingress" $index) }}
{{- else if eq $direction "egress" }}
{{- if eq $type "fqdn" }}
      toFQDNs:
        - matchName: {{ $endpoint | quote }}
{{- else if eq $type "cidr" }}
      toCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $type "ip" }}
      toCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.external.endpoints[%d].type invalido: use fqdn, cidr ou ip" $index) }}
{{- end }}
{{- else if eq $type "cidr" }}
      fromCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $type "ip" }}
      fromCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.external.endpoints[%d].type invalido: use cidr ou ip para direction=ingress" $index) }}
{{- end }}
{{- if $ports }}
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{ end }}
{{- end }}
{{- end }}
{{- end }}

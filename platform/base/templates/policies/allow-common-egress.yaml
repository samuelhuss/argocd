{{- $ns := include "ns.name" . -}}
{{- $root := . -}}
{{- $np := .Values.networkPolicies | default dict -}}
{{- $cfg := $np.allowCommonEgress | default dict -}}
{{- $policies := $cfg.policies | default list -}}
{{- if $policies -}}
{{- range $i, $p := $policies }}
{{- $name := $p.name | default (printf "allow-common-egress-%d" (add1 $i)) -}}
{{- $ports := $p.ports | default ($cfg.ports | default (list 443)) -}}
{{- $protocol := $p.protocol | default ($cfg.protocol | default "TCP") -}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $root | nindent 4 }}
    claro.com.br/policy-name: allow-common-egress
spec:
  description: "Allow egress to internet on common ports"
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}
{{- else if $cfg.enabled -}}
{{- $ports := $cfg.ports | default (list 443) -}}
{{- $protocol := $cfg.protocol | default "TCP" -}}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-common-egress
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" . | nindent 4 }}
    claro.com.br/policy-name: "allow-common-egress"
spec:
  description: "Allow egress to internet on common ports"
  endpointSelector: {}
  egress:
    - toEntities:
        - world
      toPorts:
        - ports:
{{- range $p := $ports }}
            - port: {{ printf "%v" $p | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}

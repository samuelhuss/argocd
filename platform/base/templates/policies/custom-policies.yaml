{{- $ns := include "ns.name" . -}}
{{- $np := .Values.networkPolicies | default dict -}}
{{- $items := $np.customPolicies | default list -}}
{{- range $i, $p := $items }}
{{- $name := required (printf "networkPolicies.customPolicies[%d].name e obrigatorio" $i) $p.name -}}
{{- $type := required (printf "networkPolicies.customPolicies[%d].type e obrigatorio" $i) $p.type | lower -}}
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ $name | quote }}
  namespace: {{ $ns }}
  labels:
    {{- include "ns.labels" $ | nindent 4 }}
    claro.com.br/policy-name: {{ $name | quote }}
spec:
  description: {{ printf "Custom policy (%s)" $type | quote }}
  endpointSelector: {}
{{- if eq $type "ingressnamespaces" }}
{{- $namespaces := $p.namespaces | default list -}}
{{- if not $namespaces -}}
{{- fail (printf "networkPolicies.customPolicies[%d].namespaces e obrigatorio para type=ingressNamespaces" $i) -}}
{{- end }}
  ingress:
    - fromEndpoints:
{{- range $sourceNs := $namespaces }}
        - matchLabels:
            io.kubernetes.pod.namespace: {{ $sourceNs | quote }}
{{- end }}
{{- if $p.ports }}
      toPorts:
        - ports:
{{- range $port := $p.ports }}
            - port: {{ printf "%v" $port | quote }}
              protocol: {{ $p.protocol | default "TCP" | upper | quote }}
{{- end }}
{{- end }}
{{- else if eq $type "ingresscidrs" }}
{{- $cidrs := $p.cidrs | default list -}}
{{- if not $cidrs -}}
{{- fail (printf "networkPolicies.customPolicies[%d].cidrs e obrigatorio para type=ingressCIDRs" $i) -}}
{{- end }}
  ingress:
    - fromCIDRSet:
{{- range $c := $cidrs }}
        - cidr: {{ $c | quote }}
{{- end }}
{{- if $p.ports }}
      toPorts:
        - ports:
{{- range $port := $p.ports }}
            - port: {{ printf "%v" $port | quote }}
              protocol: {{ $p.protocol | default "TCP" | upper | quote }}
{{- end }}
{{- end }}
{{- else if eq $type "egressendpoints" }}
{{- $endpoints := $p.endpoints | default list -}}
{{- if not $endpoints -}}
{{- fail (printf "networkPolicies.customPolicies[%d].endpoints e obrigatorio para type=egressEndpoints" $i) -}}
{{- end }}
{{- $defaultPorts := $p.defaultPorts | default (list 443) -}}
  egress:
{{- range $idx, $ep := $endpoints }}
{{- $endpoint := "" }}
{{- $epType := "" }}
{{- $ports := $defaultPorts }}
{{- $protocol := $p.protocol | default "TCP" }}
{{- if kindIs "string" $ep }}
{{- $endpoint = $ep }}
{{- else }}
{{- $endpoint = required (printf "networkPolicies.customPolicies[%d].endpoints[%d].endpoint e obrigatorio" $i $idx) $ep.endpoint }}
{{- $ports = $ep.ports | default $defaultPorts }}
{{- $protocol = $ep.protocol | default $protocol }}
{{- if $ep.type }}
{{- $epType = lower $ep.type }}
{{- end }}
{{- end }}
{{- if not $epType }}
{{- if contains "/" $endpoint }}
{{- $epType = "cidr" }}
{{- else if regexMatch "^[0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+$" $endpoint }}
{{- $epType = "ip" }}
{{- else }}
{{- $epType = "fqdn" }}
{{- end }}
{{- end }}
    -
{{- if eq $epType "fqdn" }}
      toFQDNs:
        - matchName: {{ $endpoint | quote }}
{{- else if eq $epType "cidr" }}
      toCIDRSet:
        - cidr: {{ $endpoint | quote }}
{{- else if eq $epType "ip" }}
      toCIDRSet:
        - cidr: {{ printf "%s/32" $endpoint | quote }}
{{- else }}
{{- fail (printf "networkPolicies.customPolicies[%d].endpoints[%d].type invalido: use fqdn, cidr ou ip" $i $idx) }}
{{- end }}
{{- if $ports }}
      toPorts:
        - ports:
{{- range $port := $ports }}
            - port: {{ printf "%v" $port | quote }}
              protocol: {{ $protocol | upper | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- else }}
{{- fail (printf "networkPolicies.customPolicies[%d].type invalido: use ingressNamespaces, ingressCIDRs ou egressEndpoints" $i) -}}
{{- end }}
{{- end }}

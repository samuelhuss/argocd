# ── Campos obrigatórios ───────────────────────────────────────────────────
team: ""                  # ex: squad-payments
owner: ""                 # ex: squad-payments@claro.com.br
project: ""               # ex: api-mvp
environment: "dev"        # dev | staging | production
costCenter: ""            # ex: cc-12345

# ── Network Policies ─────────────────────────────────────────────────────
# Separado por tipo: internal, external, gateway, observability, dns, internet, custom
# Cada um com toggle "enabled" e suporte a multiplas "policies"
networkPolicies:
  
  # ════════════════════════════════════════════════════════════════════════
  # INTERNAL: Cross-namespace (ingress from other namespaces)
  # ════════════════════════════════════════════════════════════════════════
  internal:
    enabled: false
    direction: ingress
    # Namespace padrão (usado se enabled=true)
    namespaces: []
    # Ou adicionar multiplas policies customizadas:
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-ingress-from-auth
    #     direction: ingress
    #     source: auth-system
    #     namespaces: ["auth-system"]
    #     ports: [8000]
    #   - name: allow-egress-to-shared
    #     direction: egress
    #     destination: shared-services
    #     ports: [8080, 8443]

  # ════════════════════════════════════════════════════════════════════════
  # EXTERNAL: APIs, FQDNs, IPs, CIDRs (auto-detect type)
  # ════════════════════════════════════════════════════════════════════════
  external:
    enabled: false
    direction: egress
    defaultPorts: [443]
    protocol: TCP
    # Endpoints padrão (usado se enabled=true)
    endpoints: []
    # Ou multiplas policies:
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-egress-pagamentos-api
    #     direction: egress
    #     endpoints: ["api.pagamentos.com", "webhooks.pagamentos.com"]
    #     ports: [443]
    #   - name: allow-ingress-corp-vpn
    #     direction: ingress
    #     endpoints: ["10.20.0.0/24"]
    #     ports: [8443]

  # ════════════════════════════════════════════════════════════════════════
  # GATEWAY: Ingress from Gateway API / Ingress Controller
  # ════════════════════════════════════════════════════════════════════════
  gateway:
    enabled: false
    direction: ingress
    # Namespace padrão (usado se enabled=true)
    namespace: ""  # ex: gateway-system
    ports: [8080, 8443]
    protocol: TCP
    # Ou multiplas policies:
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-ingress-from-gateway
    #     direction: ingress
    #     namespace: gateway-system
    #     ports: [8080, 8443]
    #   - name: allow-ingress-from-istio
    #     namespace: istio-system
    #     ports: [8080]

  # ════════════════════════════════════════════════════════════════════════
  # OBSERVABILITY: Prometheus scrape + Loki/Jaeger logs/traces
  # ════════════════════════════════════════════════════════════════════════
  observability:
    enabled: false
    direction: ingress
    # Namespace padrão (usado se enabled=true)
    namespace: observability
    ports: [9090]
    protocol: TCP
    # Ou multiplas policies:
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-ingress-prometheus
    #     direction: ingress
    #     namespace: observability
    #     ports: [9090]
    #   - name: allow-egress-loki
    #     direction: egress
    #     namespace: observability
    #     ports: [3100]

  # ════════════════════════════════════════════════════════════════════════
  # DNS: Specific DNS servers (port 53)
  # ════════════════════════════════════════════════════════════════════════
  dns:
    enabled: true
    direction: egress
    # Default: libera DNS interno do cluster (kube-dns/coredns)
    namespace: kube-system
    podLabels:
      k8s-app: kube-dns
    # DNS servers opcionais por IP/CIDR (se informado, usa estes em vez do selector acima)
    endpoints: []
    ports: [53]
    protocols: [UDP, TCP]
    # Ou multiplas policies:
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-dns-cluster
    #     direction: egress
    #     namespace: kube-system
    #     podLabels:
    #       k8s-app: kube-dns
    #   - name: allow-dns-google
    #     direction: egress
    #     endpoints: ["8.8.8.8", "8.8.4.4"]
    #     ports: [53]
    #     protocols: [UDP, TCP]
    #   - name: allow-dns-corp
    #     direction: egress
    #     endpoints: ["10.0.0.1", "10.0.0.2"]
    #     ports: [53]

  # ════════════════════════════════════════════════════════════════════════
  # INTERNET: Unrestricted egress to world (use with caution!)
  # ════════════════════════════════════════════════════════════════════════
  internet:
    enabled: false
    direction: egress
    ports: [443, 80]
    protocol: TCP
    # Ou multiplas policies:
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-egress-https
    #     direction: egress
    #     ports: [443]
    #   - name: allow-egress-http
    #     ports: [80]

  # ════════════════════════════════════════════════════════════════════════
  # CUSTOM: Any custom case not covered above
  # ════════════════════════════════════════════════════════════════════════
  custom:
    enabled: false
    policies: []
    # Exemplo:
    # policies:
    #   - name: allow-loki-egress
    #     direction: egress
    #     type: egressEndpoints
    #     endpoints: ["loki.observability.svc.cluster.local"]
    #     ports: [3100]
    #   - name: allow-mongodb-atlas
    #     direction: egress
    #     type: egressEndpoints
    #     endpoints: ["cluster0.mongodb.net"]
    #     ports: [27017]

gatewayNamespace: "gateway-system"

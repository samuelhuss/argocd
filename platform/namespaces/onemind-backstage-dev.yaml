team: "onemind"
owner: "onemind-backstage_claro_com_br"
project: "backstage"
environment: "dev"
costCenter: "finops-b2c"

networkPolicies:
  allowGatewayAPI: false
  #allowGatewayAPIPolicies: []
  # allowGatewayAPIPolicies:
  #   - name: allow-gateway-api-public
  #     namespace: gateway-system

  allowCommonEgress:
    enabled: true
    policies: []

  allowEgress:
    enabled: true
    policies:
       - name: allow-egress-payments
         endpoints: ["ifconfig.me"]
       - name: allow-egress-fraud
         endpoints: ["api.ipify.org"]
  allowIngressFromNamespaces:
    enabled: true
    namespaces:
      - "squad-payments-dev"

  allowIngressFromCIDRs:
    enabled: false
    cidrs: []
    policies: []

  allowObservabilityMetrics:
    enabled: false
    policies: []

  customPolicies: []
  # customPolicies:
  #   - name: allow-metrics-extra
  #     type: ingressNamespaces
  #     namespaces: ["observability"]
  #     ports: [9091]
